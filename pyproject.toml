[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rnet-sso"
version = "0.2.0b1"
description = "rNet SSO Python client library"
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
keywords = ["sso", "oauth2", "rnet", "authentication"]

[project.urls]
Homepage = "https://rnetai.org"

[tool.setuptools]
packages = ["rnet_sso"]